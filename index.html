<style>
  :root{

    --azul:#002d5f;          /* Pantone 282C */
    --azul-90:#1a4270;
    --azul-70:#4d6e92;
    --azul-40:#99aec4;
    --azul-prof:#001c3b;
    --crema:#f5f6f8;
    --linea:#e7eaef;
    --texto:#1d2735;
    --gris-tx:#6b7585;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Lato',-apple-system,Arial,sans-serif;
    color:var(--texto);
    background:var(--azul-prof);
    -webkit-font-smoothing:antialiased;
  }
  /* ===== HERO ===== */
  .hero{
    position:relative;
    min-height:100vh;
    display:flex;
  }
  /* franja de marca */
  .marca{
    flex:0 0 32%;
    background:var(--azul);
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:2rem;
    overflow:hidden;
  }
  .marca::after{
    /* medalla tenue de fondo, como en el manual */
    content:"";
    position:absolute;
    width:130%;
    aspect-ratio:1;
    right:-55%;
    border:2px solid rgba(255,255,255,.05);
    border-radius:50%;
  }
  .marca img{
    width:min(70%,230px);
    position:relative;
    z-index:1;
  }
  /* panel con foto */
  .panel{
    flex:1;
    position:relative;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:5vw 5.5vw;
    background-image:
      linear-gradient(108deg, rgba(0,28,59,.96) 0%, rgba(0,28,59,.78) 40%, rgba(0,28,59,.55) 100%),
      var(--foto-desk);
    background-size:cover;
    background-position:center;
  }
  .kicker{
    color:#fff;
    letter-spacing:.24em;
    text-transform:uppercase;
    font-size:.72rem;
    font-weight:700;
    padding-left:.2rem;
    margin-bottom:1.1rem;
    opacity:0; animation:rise .7s ease .1s forwards;
  }
  .kicker::before{
    content:"";
    display:inline-block;
    width:26px;height:2px;
    background:#fff;
    vertical-align:middle;
    margin-right:.7rem;
    margin-bottom:.18em;
  }
  h1.titulo{
    color:#fff;
    font-weight:900;
    font-size:clamp(2rem,3.6vw,3.4rem);
    line-height:1.12;
    letter-spacing:-.01em;
    max-width:16ch;
    margin-bottom:2rem;
    opacity:0; animation:rise .8s ease .25s forwards;
  }
  /* ===== BUSCADOR ===== */
  .buscador{
    width:100%; max-width:640px;
    opacity:0; animation:rise .8s ease .55s forwards;
  }
  .campo{
    display:flex; align-items:center;
    background:#fff;
    border-radius:6px;
    box-shadow:0 26px 64px -22px rgba(0,0,0,.6);
    overflow:hidden;
  }
  .campo svg{margin-left:1.15rem;flex:0 0 22px;opacity:.5}
  .campo input{
    flex:1; border:0; outline:0;
    padding:1.15rem 1rem;
    font-family:'Lato',sans-serif;
    font-size:1.05rem;
    color:var(--texto);
    background:transparent;
  }
  .campo input::placeholder{color:#9aa3b2}
  .campo button{
    border:0; cursor:pointer;
    background:var(--azul);
    color:#fff;
    font-family:'Lato',sans-serif;
    font-weight:700;
    font-size:.95rem;
    padding:1.15rem 1.7rem;
    transition:background .2s;
  }
  .campo button:hover{background:var(--azul-90)}
  .campo button .btxt-corta{display:none}
  .chips{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:1rem;align-items:center}
  .chips .lbl{
    font-size:.68rem;font-weight:700;letter-spacing:.1em;
    text-transform:uppercase;color:rgba(255,255,255,.5);margin-right:.15rem;
  }
  .chip{
    background:rgba(255,255,255,.1);
    border:1px solid rgba(255,255,255,.2);
    color:#fff;
    font-family:'Lato',sans-serif;
    font-size:.84rem;
    padding:.42rem .9rem;
    border-radius:30px;
    cursor:pointer;
    transition:all .18s;
  }
  .chip:hover{background:#fff;color:var(--azul);border-color:#fff}
  /* resultados */
  .resultados{
    margin-top:.85rem;
    background:#fff;
    border-radius:6px;
    overflow:hidden;
    box-shadow:0 26px 64px -22px rgba(0,0,0,.6);
    display:none;
  }
  .resultados.activo{display:block}
  .res-cabe{
    padding:.65rem 1.1rem;
    font-size:.68rem;font-weight:700;letter-spacing:.1em;
    text-transform:uppercase;color:var(--gris-tx);
    border-bottom:1px solid var(--linea);
    background:var(--crema);
  }
  .res-item{
    display:flex;align-items:center;gap:.95rem;
    padding:.95rem 1.1rem;

  .res-item:hover{background:var(--crema)}

  .res-tx small{color:var(--gris-tx);font-size:.82rem}
  .res-flecha{margin-left:auto;color:var(--azul);opacity:.35;font-size:1.3rem}
  .res-ext{

  /* conocer */

  .conocer a{
    display:inline-flex;align-items:center;gap:.7rem;
    color:#fff;text-decoration:none;
    font-size:1.02rem;font-weight:600;
    padding:.95rem 1.55rem;
    border:1.5px solid rgba(255,255,255,.5);
    border-radius:6px;
    background:rgba(255,255,255,.06);
    transition:all .2s;
  }
  .conocer a:hover{background:#fff;color:var(--azul-prof);border-color:#fff;transform:translateY(-1px)}
  @keyframes rise{to{opacity:1;transform:translateY(0)}}
  h1.titulo,.buscador,.conocer{transform:translateY(15px)}
  /* sello demo */
  .demo{
    position:fixed;top:0;right:0;z-index:60;
    background:#fff;color:var(--azul);
    font-size:.6rem;font-weight:900;letter-spacing:.13em;
    text-transform:uppercase;
    padding:.36rem .85rem;
    border-bottom-left-radius:6px;
    box-shadow:0 4px 14px rgba(0,0,0,.2);
  }

    .hero{flex-direction:column}
    .marca{

function norm(s){
  return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9\s]/g," ").replace(/\s+/g," ").trim();
}

function buscarConScores(consulta){
  const q = norm(consulta);
  if(!q) return [];
  const palabras = q.split(" ");
  return DESTINOS.map(dest=>{
    let score = 0;
    dest.claves.forEach(clave=>{
      const c = norm(clave);
      if(q.includes(c)) score += c.split(" ").length * 10;
      else if(c.includes(q) && q.length>2) score += 6;
      else palabras.forEach(p=>{
        if(p.length<3) return;
        if(c===p) score += 5;
        else if(c.includes(p)||p.includes(c)) score += 2;
      });
    });
    const tn = norm(dest.t);
    palabras.forEach(p=>{ if(p.length>2 && tn.includes(p)) score += 3; });
    return {dest,score};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
}
function buscar(consulta){
  return buscarConScores(consulta).slice(0,5).map(x=>x.dest);
}

/* ============================================================
   BUSCADOR — matcher local instantáneo + fallback IA
   ============================================================
   - Live (tipear): matcher local, gratis e instantáneo.
   - Confirmar (Enter/Buscar): si el matcher local está confiado
     (score > UMBRAL) usa eso. Si no, le pide a la IA del backend
     que rankee los destinos. Si la IA falla, fallback al matcher. */
const API_BUSCAR_URL = 'https://bcr-lluvias-app.onrender.com/api/buscar';
const SCORE_UMBRAL_IA = 15;

const $q=document.getElementById('q'),
      $btn=document.getElementById('btn'),
      $res=document.getElementById('resultados');

function tarjeta(d){
  const ext = d.ext ? '<span class="res-ext">sitio externo</span>' : '';
  return `<a class="res-item" href="${d.u}" target="_top">
    <span class="res-tx"><b>${d.t}${ext}</b><small>${d.d}</small></span>
    <span class="res-flecha">→</span></a>`;
}
function pintarVacio(c){
  return `<div class="res-cabe">Sin coincidencias</div>
    <div class="res-vacio">No encontramos algo para “${c}”. Probá con otras palabras
    o <a href="https://www.bcr.com.ar/es/buscar" target="_top">usá el buscador completo del sitio</a>.</div>`;
}
function pintarHits(hits, cabe){
  $res.innerHTML = `<div class="res-cabe">${cabe}</div>` + hits.map(tarjeta).join('');
}
function activar(){ $res.classList.add('activo'); }
function cabeNormal(n){ return `${n} resultado${n>1?'s':''} — tocá para ir`; }

/* Live: cada tecla → matcher local, instantáneo */
function mostrar(c){
  if(!c.trim()){ $res.classList.remove('activo'); $res.innerHTML=''; return; }
  const hits = buscar(c);
  if(hits.length===0) $res.innerHTML = pintarVacio(c);
  else pintarHits(hits, cabeNormal(hits.length));
  activar();
}

/* Al confirmar (Enter/Buscar): score alto → matcher; bajo → IA. */
async function ejecutarBusqueda(consulta){
  const c = consulta.trim();
  if(!c) return;
  const conScores = buscarConScores(c);
  const best = conScores[0]?.score || 0;

  if(best > SCORE_UMBRAL_IA){
    const hits = conScores.slice(0,5).map(x=>x.dest);
    pintarHits(hits, cabeNormal(hits.length));
    activar();
    return;
  }

  $res.innerHTML = '<div class="res-cabe">🤖 Buscando con IA…</div>';
  activar();

  try{
    const matches = await buscarIA(c);
    if(matches.length > 0){
      pintarHits(matches, `🤖 Resultados con IA — ${matches.length} destino${matches.length>1?'s':''}`);
    } else if(conScores.length > 0){
      const hits = conScores.slice(0,3).map(x=>x.dest);
      pintarHits(hits, cabeNormal(hits.length));
    } else {
      $res.innerHTML = pintarVacio(c);
    }
  } catch(err){
    console.warn('[buscador IA] fallback a matcher local:', err.message);
    if(conScores.length > 0){
      const hits = conScores.slice(0,3).map(x=>x.dest);
      pintarHits(hits, cabeNormal(hits.length));
    } else {
      $res.innerHTML = pintarVacio(c);
    }
  }
  activar();
}

async function buscarIA(consulta){
  if(API_BUSCAR_URL.includes('PLACEHOLDER')) throw new Error('Backend URL aún no configurada');
  const destinos = DESTINOS.map(d=>({t:d.t, d:d.d, u:d.u}));
  const res = await fetch(API_BUSCAR_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({q:consulta, destinos})
  });
  if(!res.ok) throw new Error('HTTP '+res.status);
  const data = await res.json();
  return (data.matches||[])
    .map(m => DESTINOS.find(d=>d.u===m.u))
    .filter(Boolean);
}

$q.addEventListener('input', e=>mostrar(e.target.value));
$btn.addEventListener('click', ()=>ejecutarBusqueda($q.value));
$q.addEventListener('keydown', e=>{ if(e.key==='Enter') ejecutarBusqueda($q.value); });
</script>
